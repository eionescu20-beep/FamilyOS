<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>FamilyOS - Family</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
}

.sidebar {
  width: 200px;
  height: 100vh;
  position: fixed;
  background: rgba(0,0,0,0.3);
  padding: 20px;
}

.sidebar a {
  display: block;
  margin: 10px 0;
  color: white;
  text-decoration: none;
}

.main {
  margin-left: 220px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
}

button {
  background: #00c6ff;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>FamilyOS</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="family.html">Family</a>
</div>

<div class="main">
  <h1>Family Members</h1>

  <div class="card">
    <input id="name" placeholder="name">
    <button onclick="addMember()">Adaugă</button>
  </div>

  <div id="list"></div>
</div>

<script>
<script>
const supabaseClient = supabase.createClient(
  "https://mcqjnykrupqplsrzjuvm.supabase.co",
  "https://mcqjnykrupqplsrzjuvm.supabase.co"
);

async function addMember() {
  const name = document.getElementById("name").value;

  if (!name) {
    alert("Scrie un nume");
    return;
  }

  const { data, error } = await supabaseClient
    .from("family")
    .insert([
      { name: name }
    ]);

  if (error) {
    alert("Eroare: " + error.message);
  } else {
    alert("Adăugat!");
    document.getElementById("name").value = "";
    loadMembers();
  }
}

async function loadMembers() {
  const { data, error } = await supabaseClient
    .from("family")
    .select("*");

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (data) {
    data.forEach(item => {
      const li = document.createElement("li");
      li.textContent = item.name;
      list.appendChild(li);
    });
  }
}

loadMembers();
</script>
