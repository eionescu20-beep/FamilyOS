<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>FamilyOS - Family</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #07111f;
  color: white;
}

.layout {
  display: grid;
  grid-template-columns: 200px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: #0f1f33;
  padding: 20px;
}

.sidebar a {
  display: block;
  color: #cbd5e1;
  text-decoration: none;
  margin: 12px 0;
  font-weight: bold;
}

.main {
  padding: 20px;
}

.card {
  background: #102033;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  width: 100%;
  margin-top: 10px;
}

button {
  padding: 10px 20px;
  margin-top: 10px;
  background: #00c6ff;
  border: none;
  color: white;
  cursor: pointer;
}

#list div {
  background: #1e3a5f;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="layout">

  <div class="sidebar">
    <h2>FamilyOS</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="family.html">Family</a>
  </div>

  <div class="main">
    <h1>Family Members</h1>

    <div class="card">
      <input id="name" placeholder="Nume membru">
      <button onclick="addMember()">Adaugă</button>
    </div>

    <div id="list"></div>
  </div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://mcqjnykrupqplsrzjuvm.supabase.co",
  "sb_publishable_9XFTG46eg3zJuE-aoKMxFw_c4N1HOzM"
);

async function addMember() {
  const name = document.getElementById("name").value;

  if (!name) {
    alert("Scrie un nume");
    return;
  }

  const { data: userData } = await supabaseClient.auth.getUser();

  if (!userData.user) {
    alert("Trebuie să fii logat.");
    window.location.href = "signup.html";
    return;
  }

  const { error } = await supabaseClient
    .from("family")
    .insert([{ 
      name: name,
      user_id: userData.user.id
    }]);

  if (error) {
    alert("Eroare: " + error.message);
  } else {
    alert("Adăugat!");
    document.getElementById("name").value = "";
    loadMembers();
  }
}
  
async function deleteMember(id) {
  const { error } = await supabaseClient
    .from("family")
    .delete()
    .eq("id", id);

  if (error) {
    alert("Eroare la ștergere: " + error.message);
  } else {
    loadMembers();
  }
}

async function loadMembers() {
  const { data, error } = await supabaseClient
    .from("family")
    .select("*")
    .order("id", { ascending: true });

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (error) {
    alert("Eroare listă: " + error.message);
    return;
  }

  data.forEach(item => {
    const div = document.createElement("div");
    div.style.display = "flex";
    div.style.justifyContent = "space-between";
    div.style.alignItems = "center";

    const span = document.createElement("span");
    span.innerText = item.name;

    const btn = document.createElement("button");
    btn.innerText = "Șterge";
    btn.onclick = () => deleteMember(item.id);

    div.appendChild(span);
    div.appendChild(btn);
    list.appendChild(div);
  });
}

loadMembers();
</script>
  
</body>
</html>
