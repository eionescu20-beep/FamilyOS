<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>FamilyOS Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
}

.layout {
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 200px;
  height: 100vh;
  background: rgba(0,0,0,0.3);
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.sidebar a {
  display: block;
  margin: 15px 0;
  color: #cbd5e1;
  text-decoration: none;
  font-weight: bold;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="layout">

  <div class="sidebar">
    <h2>FamilyOS</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="#">Planner AI</a>
    <a href="#">Budget AI</a>
    <a href="family.html">Family</a>
    <a href="#">Settings</a>
  </div>

  <div class="main">
    <h1>Family Command Center</h1>
    <p>Your family, organized in one place.</p>

    <div class="grid">
      <div class="card">
        <h3>Today</h3>
        <p>No urgent events yet.</p>
      </div>

      <div class="card">
        <h3>Planner AI</h3>
        <p>Plan your week with smart suggestions.</p>
      </div>

      <div class="card">
        <h3>Budget AI</h3>
        <p>Track bills, expenses and subscriptions.</p>
      </div>

      <div class="card">
        <h3>Account</h3>
        <p>Logged in user</p>
      </div>
    </div>

  </div>

</div>

</body>
</html>
