<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>FamilyOS - Sign Up</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f19;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #121826;
      padding: 30px;
      border-radius: 16px;
      width: 320px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: gold;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Începe Gratuit</h2>
  <p>Creează contul tău</p>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Parolă">

  <button onclick="signup()">Creează cont</button>
</div>

<script>
  // 🔥 PUNE DATELE TALE AICI
  const supabaseClient = supabase.createClient(
    "https://mcqjnykrupqplsrzjuvm.supabase.co",
    "sb_publishable_9XFTG46eg3zJuE-a0KMxFw_c4N1HOZM"
  );

  async function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
      alert("Completează toate câmpurile");
      return;
    }

    const { data, error } = await supabaseClient.auth.signUp({
      email: email,
      password: password
    });

    if (error) {
      alert(error.message);
    } else {
      alert("Cont creat! Verifică emailul 📩");
    }
  }
</script>

</body>
</html>
