<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamilyOS - Sign Up</title>

<style>
body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: linear-gradient(135deg, #07111F, #0B1220);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 16px;
    width: 320px;
    text-align: center;
    backdrop-filter: blur(10px);
}

h1 {
    margin-bottom: 10px;
}

p {
    opacity: 0.7;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #FFD54F;
    font-weight: bold;
    cursor: pointer;
}

.success {
    margin-top: 15px;
    color: #4CAF50;
}
</style>
</head>

<body>

<div class="container">
    <h1 id="title">Start Free</h1>
    <p id="subtitle">Create your account</p>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="signup()" id="btn">Create Account</button>

    <div class="success" id="success"></div>
</div>

<script>
// 🌍 Auto language detect
const lang = navigator.language || navigator.userLanguage;

const text = {
    en: {
        title: "Start Free",
        subtitle: "Create your account",
        btn: "Create Account",
        success: "Account created!"
    },
    ro: {
        title: "Începe Gratuit",
        subtitle: "Creează contul tău",
        btn: "Creează Cont",
        success: "Cont creat!"
    }
};

const t = lang.startsWith("ro") ? text.ro : text.en;

document.getElementById("title").innerText = t.title;
document.getElementById("subtitle").innerText = t.subtitle;
document.getElementById("btn").innerText = t.btn;

// 💾 Fake signup (local storage)
function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Complete all fields");
        return;
    }

    localStorage.setItem("familyos_user", JSON.stringify({ email }));

    document.getElementById("success").innerText = t.success;
}
</script>

</body>
</html>
