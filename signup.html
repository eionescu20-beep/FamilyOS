<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FamilyOS - Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #07111f;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
    }

    .card {
      width: 360px;
      background: #102033;
      padding: 32px;
      border-radius: 18px;
      text-align: center;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #ffd400;
      color: #111;
    }

    .secondary {
      background: white;
      color: #111;
    }

    .message {
      margin-top: 15px;
      color: #ffd400;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>FamilyOS</h1>
    <p>Login sau creează cont</p>

    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button class="primary" onclick="signup()">Creează cont</button>
    <button class="secondary" onclick="login()">Login</button>

    <div id="message" class="message"></div>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://mcqjnykrupqplsrzjuvm.supabase.co",
      "sb_publishable_9XFTG46eg3zJuE-aoKMxFw_c4N1HOzM"
    );

    function showMessage(text) {
      document.getElementById("message").innerText = text;
    }

    window.signup = async function () {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        showMessage("Completează email și parolă.");
        return;
      }

      const { error } = await supabaseClient.auth.signUp({
        email,
        password
      });

      if (error) {
        showMessage(error.message);
      } else {
        showMessage("Cont creat. Verifică emailul pentru confirmare.");
      }
    };

    window.login = async function () {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        showMessage("Completează email și parolă.");
        return;
      }

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showMessage(error.message);
      } else {
        showMessage("Login reușit. Bine ai venit în FamilyOS.");
      }
    };
  </script>
</body>
</html>
