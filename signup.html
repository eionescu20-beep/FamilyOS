<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FamilyOS - Sign Up</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: #121826;
      padding: 34px;
      border-radius: 18px;
      width: 330px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      background: #f4c542;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Începe Gratuit</h1>
    <p>Creează contul tău</p>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Creează cont</button>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://mcqjnykrupqplsrzjuvm.supabase.co",
      "sb_publishable_9XFTG46eg3zJuE-aoKMxFw_c4N1HOzM"
    );

    async function signup() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        alert("Completează toate câmpurile");
        return;
      }

      const { error } = await supabaseClient.auth.signUp({
        email: email,
        password: password
      });

      if (error) {
        alert(error.message);
      } else {
        alert("Cont creat! Verifică emailul 📩");
      }
    }
  </script>
</body>
</html>
