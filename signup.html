<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — FamilyOS</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(201,168,93,0.12), transparent 34%),
        linear-gradient(180deg, #07111F 0%, #0B1220 100%);
      color: #F8FAFC;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      padding: 36px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(15,23,42,0.96), rgba(30,41,59,0.78));
      border: 1px solid rgba(226,232,240,0.13);
      box-shadow: 0 40px 120px rgba(0,0,0,0.42);
    }

    .logo {
      font-size: 28px;
      font-weight: 950;
      letter-spacing: -0.05em;
      margin-bottom: 24px;
    }

    .logo span { color: #C9A85D; }

    h1 {
      font-size: 36px;
      line-height: 1;
      letter-spacing: -0.05em;
      margin: 0 0 12px;
    }

    p {
      color: #CBD5E1;
      line-height: 1.5;
      margin: 0 0 28px;
    }

    label {
      display: block;
      font-weight: 800;
      margin: 16px 0 8px;
      color: #E5E7EB;
    }

    input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 13px;
      border: 1px solid rgba(226,232,240,0.16);
      background: rgba(255,255,255,0.06);
      color: #F8FAFC;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #C9A85D;
      box-shadow: 0 0 0 3px rgba(201,168,93,0.14);
    }

    .terms {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin: 20px 0;
      color: #CBD5E1;
      font-size: 14px;
      line-height: 1.45;
    }

    .terms input {
      width: auto;
      margin-top: 3px;
    }

    .terms a {
      color: #F8D982;
      text-decoration: none;
      font-weight: 800;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 17px;
      background: linear-gradient(135deg, #F8D982, #C9A85D);
      color: #0B1220;
      font-weight: 950;
      font-size: 16px;
      cursor: pointer;
      margin-top: 6px;
    }

    .back {
      display: block;
      text-align: center;
      color: #94A3B8;
      text-decoration: none;
      margin-top: 20px;
      font-size: 14px;
    }

    .note {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(226,232,240,0.10);
      color: #CBD5E1;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="logo">Family<span>OS</span></div>

    <h1>Create your account</h1>
    <p>Start organizing your family life with the AI operating system for modern families.</p>

    <form>
      <label for="name">Full name</label>
      <input id="name" type="text" placeholder="Alex Johnson" required />

      <label for="email">Email address</label>
      <input id="email" type="email" placeholder="you@email.com" required />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Create a secure password" required />

      <div class="terms">
        <input id="agree" type="checkbox" required />
        <div>
          I agree to the
          <a href="terms.html">Terms of Service</a>
          and
          <a href="privacy.html">Privacy Policy</a>.
        </div>
      </div>

      <button type="submit">Create Account</button>
    </form>

    <div class="note">
      Your family data is protected. Security, privacy and GDPR-ready structure are part of FamilyOS from day one.
    </div>

    <a class="back" href="index.html">← Back to homepage</a>
  </main>
</body>
</html>
