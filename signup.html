<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Signup</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      background: #0b1b2b;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .card {
      background: #1e3a5f;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
    }

    .btn {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .primary {
      background: gold;
    }

    .google {
      background: white;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Începe Gratuit</h2>
  <p>Creează contul tău</p>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="btn primary" onclick="signup()">Creează cont</button>

  <button class="btn google" onclick="loginWithGoogle()">
  Continuă cu Google
</button>
</div>

<script>
  const supabaseClient = supabase.createClient(
    "mcqjnykrupqplsrzjuvm,
    "sb_publishable_9XFTG46eg3zJuE-aoKMxFw_c4N1HOzM"
    );

  async function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabaseClient.auth.signUp({
      email,
      password
    });

    if (error) {
      alert(error.message);
    } else {
      alert("Cont creat! Verifică email.");
    }
  }

  async function loginWithGoogle() {
  alert("CLICK"); // test

  const { error } = await supabaseClient.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: "https://family-os-eosin-psi.vercel.app"
    }
  });

  if (error) {
    alert(error.message);
  }
}</script>

</body>
</html>
