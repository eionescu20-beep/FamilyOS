<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      width: 300px;
      text-align: center;
      color: white;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
    }

    .btn {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #facc15;
      color: black;
    }

    .google {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Începe Gratuit</h2>
    <p>Creează contul tău</p>

    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button class="btn primary" onclick="signup()">Creează cont</button>

    <button class="btn google" onclick="loginWithGoogle()">
      Continuă cu Google
    </button>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://mcqjnykrupqplsrzjuvm.supabase.co",
      "sb_publishable_9XFTG46eg3zJuE-aoKMxFw_c4N1HOzM"
    );

    async function signup() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabaseClient.auth.signUp({
        email,
        password
      });

      if (error) {
        alert(error.message);
      } else {
        alert("Cont creat! Verifică email.");
      }
    }

    async function loginWithGoogle() {
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: window.location.origin
        }
      });

      if (error) {
        alert(error.message);
      }
    }
  </script>

</body>
</html>
